<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#4f8ef7"/>
      <stop offset="100%" stop-color="#1a4fc4"/>
    </radialGradient>
    <radialGradient id="skinGrad" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fcd5b0"/>
      <stop offset="100%" stop-color="#e8a87c"/>
    </radialGradient>
    <clipPath id="avatarCircle">
      <circle cx="100" cy="100" r="100"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGrad)"/>
  <!-- Shirt/body -->
  <ellipse cx="100" cy="190" rx="70" ry="55" fill="#1a4fc4" clip-path="url(#avatarCircle)"/>
  <ellipse cx="100" cy="175" rx="50" ry="40" fill="#2563eb" clip-path="url(#avatarCircle)"/>
  <!-- Neck -->
  <rect x="88" y="128" width="24" height="28" rx="6" fill="url(#skinGrad)" clip-path="url(#avatarCircle)"/>
  <!-- Head -->
  <ellipse cx="100" cy="105" rx="42" ry="46" fill="url(#skinGrad)"/>
  <!-- Hair -->
  <ellipse cx="100" cy="72" rx="44" ry="28" fill="#3b1a08"/>
  <ellipse cx="100" cy="65" rx="42" ry="22" fill="#4a2210"/>
  <ellipse cx="62" cy="90" rx="15" ry="28" fill="#4a2210"/>
  <ellipse cx="138" cy="90" rx="15" ry="28" fill="#4a2210"/>
  <!-- Eyes -->
  <ellipse cx="86" cy="105" rx="8" ry="6" fill="white"/>
  <ellipse cx="114" cy="105" rx="8" ry="6" fill="white"/>
  <circle cx="87" cy="106" r="4.5" fill="#1a0a00"/>
  <circle cx="115" cy="106" r="4.5" fill="#1a0a00"/>
  <circle cx="88" cy="105" r="1.5" fill="white"/>
  <circle cx="116" cy="105" r="1.5" fill="white"/>
  <!-- Eyebrows -->
  <path d="M78 97 Q86 93 94 97" stroke="#3b1a08" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M106 97 Q114 93 122 97" stroke="#3b1a08" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M98 112 Q96 122 98 126 Q100 128 102 126 Q104 122 102 112" stroke="#c4845a" stroke-width="1" fill="none"/>
  <!-- Smile -->
  <path d="M90 136 Q100 143 110 136" stroke="#b05030" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
